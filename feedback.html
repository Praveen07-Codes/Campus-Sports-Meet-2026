
<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>Campus Sports Meet 2026</h1>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="sports.html">Sports Events</a></li>
            <li><a href="feedback.html">Feedback</a></li>
        </ul>
    </nav>
</header>
<main class="container">
    <section class="c1">
        <h2>Feedback Form</h2>
        <form id="feedbackForm">
            <input type="text" id="studentName" placeholder="Student Name">
            <input type="text" id="registerNumber" placeholder="Register Number">
            <select id="eventAttended">
                <option value="">Select Event</option>
                <option>Football</option>
                <option>Cricket</option>
                <option>Basketball</option>
                <option>Badminton</option>
                <option>Volleyball</option>
            </select>
            <select id="rating">
                <option value="">Select Rating</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
            <textarea id="comments" placeholder="Enter comments"></textarea>
            <button type="submit">Submit Feedback</button>
        </form>
        <p id="feedbackMessage"></p>
        <h3>Average Rating: <span id="averageRating">0</span></h3>
        <div id="feedbackSummary"></div>
    </section>
</main>
<footer>
    <p>Department of Physical Education | Contact: sportsmeet2026@college.edu</p>
</footer>
<script>
    let totalRatings = 0;
    let feedbackCount = 0;
    document.getElementById("feedbackForm").addEventListener("submit", function(event) {
        event.preventDefault();
        const studentName = document.getElementById("studentName").value.trim();
        const registerNumber = document.getElementById("registerNumber").value.trim();
        const eventAttended = document.getElementById("eventAttended").value;
        const rating = document.getElementById("rating").value;
        const comments = document.getElementById("comments").value.trim();
        const registerPattern = /^[A-Z]{2}[0-9]{4}$/;
        if (!registerPattern.test(registerNumber)) {
            showFeedbackError("Invalid register number format");
            return;
        }
        if (eventAttended === "") {
            showFeedbackError("Please select event");
            return;
        }
        if (rating === "") {
            showFeedbackError("Please select rating");
            return;
        }
        if (comments.length < 20) {
            showFeedbackError("Comments should contain minimum 20 characters");
            return;
        }
        document.getElementById("feedbackMessage").innerHTML = "Feedback Submitted Successfully!";
        document.getElementById("feedbackMessage").className = "success";
        totalRatings += parseInt(rating);
        feedbackCount++;
        const average = (totalRatings / feedbackCount).toFixed(1);
        document.getElementById("averageRating").innerHTML = average;
        document.getElementById("feedbackSummary").innerHTML += `
            <div class="participant-card">
                <h3>${studentName}</h3>
                <p><strong>Register No:</strong> ${registerNumber}</p>
                <p><strong>Event:</strong> ${eventAttended}</p>
                <p><strong>Rating:</strong> ${rating}</p>
                <p><strong>Comments:</strong> ${comments}</p>
            </div>
        `;
        document.getElementById("feedbackForm").reset();
    });
    function showFeedbackError(text) {
        const msg = document.getElementById("feedbackMessage");
        msg.innerHTML = text;
        msg.className = "error";
    }
</script>
</body>
</html>
